name: Generate Profile Animations

on:
  # 毎日 00:00 UTC に自動更新
  schedule:
    - cron: "0 18 * * *"
  # main へのpush時にも更新
  push:
    branches:
      - main
  # 手動実行も可能 (Actionsタブから)
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 🏙 Contribution を立体の街並みにする（自作スクリプト）
      - name: Generate city SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USER: razu9120
          OUT_DIR: dist
        run: node scripts/generate-city.js

      # dist/ 一式を output ブランチへ公開
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
